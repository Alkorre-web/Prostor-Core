<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LifeProject{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🎯 LifeProject</div>
        <div class="nav-links">
            <a href="{{ url_for('index.index') }}" class="nav-link">Главная</a>
            <a href="{{ url_for('rewards.rewards_list') }}" class="nav-link">Награды</a>
            <a href="{{ url_for('settings.setting_page') }}" class="nav-link">Настройки</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
