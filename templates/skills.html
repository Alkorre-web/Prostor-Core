{% extends 'base.html' %}

{% block title %}Дерево Навыков{% endblock %}

{% block content %}
<h1 style="color: white;">🌳 Дерево Навыков</h1>
<p style="color: #aaa;">Корней: {{ tree|length }}</p>

{% for skill in tree %}
<div style="color: white; background: #2a2a4e; padding: 15px; margin: 10px 0; border-left: 4px solid {{ skill.color }};">
    {{ skill.icon }} {{ skill.name }} (Ур.{{ skill.level }})
</div>
{% endfor %}
{% endblock %}
